# Mamformer Pro Model Configuration
# Enhanced architecture to compete with Mistral-7B
# Key upgrades: d_ff=14336, Mamba expand=2, Sliding Window Attention

model:
  name: "Mamformer-pro-7b"
  d_model: 4096
  n_layers: 26          # More layers for reasoning depth, expand=1 for balance
  n_heads: 32           # Query heads (GQA)
  n_kv_heads: 8         # Key/Value heads (GQA)
  head_dim: 128
  d_ff: 14336           # Matching Mistral-7B FFN capacity
  vocab_size: 32000     # Matching Mistral tokenizer size
  max_seq_len: 8192
  tie_word_embeddings: true

  # Sliding Window Attention (matching Mistral-7B)
  sliding_window: 4096
  use_sliding_window: true

  # Mamba-2 SSM settings (enhanced)
  mamba:
    expand: 1           # d_inner = d_model (balanced with more layers for depth)
    d_state: 128        # SSM state dimension
    d_conv: 4           # 1D convolution kernel size
    dt_rank: "auto"     # auto = ceil(d_model / 16)

  # Interleaved Attention: 1:3 ratio (8 hybrid / 18 SSM-only for 26 layers)
  interleave:
    enabled: true
    pattern: "attn_every_k"
    attn_every_k: 4
    first_layer_attn: true
    last_layers_dense: 2

  # RoPE settings
  rope:
    theta: 1000000.0    # Increased for better long-context extrapolation
    use_yarn: true

  # Regularization
  dropout: 0.0
  rms_norm_eps: 1e-6

  # Initialization
  initializer_range: 0.02

training:
  batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 3.0e-4
  weight_decay: 0.1
  warmup_steps: 2000
  max_steps: 100000
  max_seq_len: 8192
  lr_schedule: "cosine"
  optimizer: "adamw"
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_epsilon: 1.0e-8
  mixed_precision: "bf16"
  gradient_checkpointing: true

  # FSDP settings
  fsdp:
    enabled: true
    sharding_strategy: "FULL_SHARD"
    cpu_offload: false
