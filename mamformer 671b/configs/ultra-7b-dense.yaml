# Mamformer Ultra 7B Dense Configuration (Ablation Variant)
# DSA + MTP enabled, but NO MoE — useful for isolating MoE's contribution.
#
# Active/Total parameters: ~7.5B (fully dense)
# Use this for ablation studies comparing MoE vs dense scaling.

model:
  name: "Mamformer-Ultra-7b-Dense"
  d_model: 4096
  n_layers: 32
  n_heads: 32
  n_kv_heads: 8
  head_dim: 128
  d_ff: 14336          # Larger FFN to match Mistral-7B
  vocab_size: 128000
  max_seq_len: 8192
  tie_word_embeddings: true

  sliding_window: 4096
  use_sliding_window: true

  mamba:
    expand: 2
    d_state: 128
    d_conv: 4
    dt_rank: "auto"

  # MoE DISABLED for ablation
  moe:
    enabled: false

  # DSA enabled
  dsa:
    enabled: true
    lambda_init: 0.8
    use_state_injection: true
    state_injection_dim: 64

  # MTP enabled
  mtp:
    enabled: true
    depth: 2
    loss_weight: 0.3

  # Interleaved Attention: 1:3 ratio (10 hybrid / 22 SSM-only)
  interleave:
    enabled: true
    pattern: "attn_every_k"
    attn_every_k: 4
    first_layer_attn: true
    last_layers_dense: 2

  rope:
    theta: 1000000.0
    use_yarn: true

  dropout: 0.0
  rms_norm_eps: 1e-6
  initializer_range: 0.02

training:
  batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 3.0e-4
  weight_decay: 0.1
  warmup_steps: 2000
  max_steps: 100000
  max_seq_len: 8192
  lr_schedule: "cosine"
  optimizer: "adamw"
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_epsilon: 1.0e-8
  mixed_precision: "bf16"
  gradient_checkpointing: true

  fsdp:
    enabled: true
    sharding_strategy: "FULL_SHARD"
    cpu_offload: false
